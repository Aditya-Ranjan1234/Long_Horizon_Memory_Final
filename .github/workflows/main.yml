name: Deploy to HF Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "aditya87331@gmail.com"
          git config --global user.name "Aditya-Ranjan1234"

          # Clone the HF space
          git clone https://huggingface.co/spaces/aditya-ranjan1234/long-horizon-memory-env-final hf-space
          
          # Clean hf-space except .git
          find hf-space -maxdepth 1 -not -name 'hf-space' -not -name '.git' -exec rm -rf {} +
          
          # Copy only required files/folders
          echo "Copying application files..."
          cp -r server hf-space/
          cp -r images hf-space/
          cp -r dashboard_dist hf-space/
          cp -r verification hf-space/
          cp app.py hf-space/ || true
          cp models.py hf-space/ || true
          cp README.md hf-space/ || true
          cp pyproject.toml hf-space/ || true
          cp uv.lock hf-space/ || true
          cp Dockerfile hf-space/ || true
          cp .gitignore hf-space/ || true
          cp *.txt hf-space/ || true

          cd hf-space
          
          # Final safety check: remove any accidentally copied large directories
          rm -rf memory_action_sft_qwen15b memory_action_grpo_qwen15b .venv venv
          
          echo "Deployment size:"
          du -sh .
          
          git add .
          echo "Git Status:"
          git status
          
          git commit -m "Auto deploy from GitHub: Clean professional build" || echo "No changes"
          git push https://aditya-ranjan1234:$HF_TOKEN@huggingface.co/spaces/aditya-ranjan1234/long-horizon-memory-env-final main
