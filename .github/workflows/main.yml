name: Deploy to HF Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "aditya87331@gmail.com"
          git config --global user.name "Aditya-Ranjan1234"

          # Clone the HF space OUTSIDE the current directory to avoid rsync recursion
          git clone https://huggingface.co/spaces/aditya-ranjan1234/long-horizon-memory-env-final ../hf-space
          
          # Sync everything EXCEPT images, large model dirs, and source ui
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github/' \
            --exclude='hf-space/' \
            --exclude='images/' \
            --exclude='ui/' \
            --exclude='memory_action_sft_qwen15b/' \
            --exclude='memory_action_grpo_qwen15b/' \
            --exclude='venv/' \
            --exclude='.venv/' \
            --exclude='*.pt' \
            --exclude='*.bin' \
            --exclude='*.safetensors' \
            ./ ../hf-space/

          cd ../hf-space
          
          # Rename README.md to Blog.md for the HF Space as requested
          if [ -f README.md ]; then
            mv README.md Blog.md
          fi
          
          echo "Deployment size:"
          du -sh .
          
          git add .
          echo "Git Status:"
          git status
          
          git commit -m "Auto deploy: Professional build (no binary images)" || echo "No changes"
          git push https://aditya-ranjan1234:$HF_TOKEN@huggingface.co/spaces/aditya-ranjan1234/long-horizon-memory-env-final main
